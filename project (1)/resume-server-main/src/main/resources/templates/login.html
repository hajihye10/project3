<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인</title>
    <!-- Tailwind CSS CDN 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Inter 폰트 설정 */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fb; /* 라이트 블루 배경 */
        }
        .login-card {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 0 10px -5px rgba(0, 0, 0, 0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .login-card:hover {
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.15), 0 0 15px -5px rgba(0, 0, 0, 0.06);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- 로그인 카드 컨테이너 -->
    <div class="login-card w-full max-w-md bg-white p-8 md:p-10 rounded-xl">
        <h1 class="text-3xl font-extrabold text-gray-800 text-center mb-6">
            <span class="mr-3 text-2xl align-middle">🔒</span>
            관리자 로그인
            <span class="ml-3 text-2xl align-middle">🔒</span>
        </h1>
        <p class="text-center text-gray-500 mb-8">
            시스템 관리를 위해 로그인 정보를 입력하세요.
        </p>

        <!-- 로그인 폼 -->
        <form th:action="@{/login-process}" method="post" class="space-y-6">
            <!-- 아이디 (Username/ID) 입력 필드 -->
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
                    관리자 ID
                </label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition duration-150"
                    placeholder="ID를 입력하세요"
                >
            </div>

            <!-- 비밀번호 (Password) 입력 필드 -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                    비밀번호
                </label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition duration-150"
                    placeholder="비밀번호를 입력하세요"
                >
            </div>

            <!-- 에러 메시지 출력 영역 -->
            <div th:if="${param.error}" class="text-center text-sm font-medium h-6 text-red-600">
                사용자 ID 또는 비밀번호가 올바르지 않습니다.
            </div>

            <!-- 로그인 버튼 -->
            <button
                type="submit"
                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-lg font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 transform hover:scale-[1.01]"
            >
                로그인
            </button>
            <button
                type="button"
                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-lg font-semibold text-indigo-700 bg-indigo-100 hover:bg-indigo-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 transform hover:scale-[1.01]">
                <a th:href="@{/join}">회원가입</a>
            </button>
        </form>
    </div>

</body>
</html>
